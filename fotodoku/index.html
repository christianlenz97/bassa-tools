<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Fotodokumentation</title>

<!-- OG -->
<meta name="description" content="BASSA Dach - Fotodokumentation fuer Baustellen">
<meta property="og:title" content="BASSA Dach - Fotodokumentation">
<meta property="og:description" content="Fotodokumentation fuer Baustellen">
<meta property="og:image" content="../shared/icon-512.png">
<meta property="og:type" content="website">

<!-- PWA -->
<meta name="theme-color" content="#f05a28">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fotodokumentation">
<link rel="apple-touch-icon" href="../shared/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../shared/datepicker.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../shared/datepicker.js"></script>
<script src="../shared/supabase.js"></script>
</head>
<body>
  <div class="topbar" id="fotodokuTopbar">
    <div class="topbar-title">Fotodokumentation</div>
    <div class="topbar-actions">
      <button class="btn outline icon-btn" id="pickBtnTop" type="button" title="Bilder hinzufügen">
        <img src="assets/add-image.png" width="18" height="18" alt="Bilder hinzufügen">
      </button>
      <button class="btn pdf-btn" id="pdfBtnTop" type="button">PDF EXPORT</button>
    </div>
  </div>

  <!-- Drag overlay (desktop only) -->
  <div class="drag-overlay" id="dragOverlay">
    <div class="drag-overlay-inner">
      <svg width="48" height="48" fill="none" stroke="#e85d0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="36" height="36" rx="6"/><circle cx="17" cy="17" r="4"/><path d="M42 30l-10-10-20 20"/></svg>
      <span>Bilder hier ablegen</span>
    </div>
  </div>

  <div class="wrap">
    <!-- ===== LEFT: Form ===== -->
    <div class="panel form-panel">
      <h1>Fotodokumentation</h1>
      <p class="panel-sub">Bilder hochladen und Dokumentation erstellen.</p>

      <div id="dropzone" class="dropzone">
        <strong>📷 Bilder hierher ziehen</strong>
        <span class="small">JPG, PNG – oder klicken zum Auswählen</span>
        <div class="upload-row">
          <label class="upload-btn" for="fileInput">Bilder auswählen</label>
        </div>
      </div>

      <div class="field">
        <label for="docTitle">1. Titel</label>
        <input id="docTitle" type="text" value="FOTODOKUMENTATION" />
      </div>
      <div class="field">
        <label for="customerName">2. Kundenname</label>
        <input id="customerName" type="text" placeholder="Name / Firma" />
      </div>
      <div class="field">
        <label for="objectName">3. Objekt / Adresse</label>
        <input id="objectName" type="text" placeholder="Bauvorhaben / Adresse" />
      </div>
      <div class="row">
        <div class="field">
          <label for="docDate">4. Datum</label>
          <input id="docDate" type="text" placeholder="TT.MM.JJJJ" autocomplete="off" />
        </div>
        <div class="field">
          <label for="layoutMode">5. Layout</label>
          <select id="layoutMode">
            <option value="cover">Titelbild</option>
            <option value="grid" selected>Ohne Titelbild</option>
          </select>
        </div>
      </div>

      <div class="thumb-section" id="thumbSection">
        <label class="section-label">Bilder</label>
        <div class="thumb-list" id="thumbbar"></div>
      </div>

      <div class="actions">
        <button class="ghost" id="clearBtn" type="button"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M1 1v4h4"/><path d="M3 8a4.5 4.5 0 103.5-5.5L1 5"/></svg>Zurücksetzen</button>
      </div>

      <input class="hidden-input" id="fileInput" type="file" accept="image/*" multiple />
      <button class="hidden-input" id="pickBtn" type="button"></button>
      <button class="hidden-input" id="pdfBtn" type="button"></button>
    </div>

    <!-- ===== RIGHT: Preview Panel ===== -->
    <div class="panel preview-panel">
      <div class="pages" id="pages"></div>
    </div>
  </div>

<script src="app.js"></script>
<script src="pdf-export.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(err) {
    console.log('SW registration failed:', err);
  });
}
</script>
</body>
</html>
