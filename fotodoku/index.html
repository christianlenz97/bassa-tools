<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Fotodokumentation</title>

<!-- OG -->
<meta name="description" content="BASSA Dach - Fotodokumentation fuer Baustellen">
<meta property="og:title" content="BASSA Dach - Fotodokumentation">
<meta property="og:description" content="Fotodokumentation fuer Baustellen">
<meta property="og:image" content="../shared/icon-512.png">
<meta property="og:type" content="website">

<!-- PWA -->
<meta name="theme-color" content="#f05a28">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fotodokumentation">
<link rel="apple-touch-icon" href="../shared/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../shared/datepicker.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../shared/datepicker.js"></script>
<script src="../shared/supabase.js"></script>
</head>
<body>
  <div class="topbar" id="fotodokuTopbar">
    <div class="topbar-title">Fotodokumentation</div>
    <div class="topbar-actions">
      <button class="btn outline icon-btn" id="pickBtnTop" type="button" title="Bilder hinzufügen">
        <img src="assets/add-image.png" width="18" height="18" alt="Bilder hinzufügen">
      </button>
      <button class="btn pdf-btn" id="pdfBtnTop" type="button">PDF EXPORT</button>
    </div>
  </div>

  <!-- Drag overlay (desktop only) -->
  <div class="drag-overlay" id="dragOverlay">
    <div class="drag-overlay-inner">
      <svg width="48" height="48" fill="none" stroke="#e85d0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="36" height="36" rx="6"/><circle cx="17" cy="17" r="4"/><path d="M42 30l-10-10-20 20"/></svg>
      <span>Bilder hier ablegen</span>
    </div>
  </div>

  <div class="wrap">
    <div class="settings-bar">
      <input class="input" id="docTitle" type="text" value="FOTODOKUMENTATION" />
      <input class="input" id="customerName" type="text" placeholder="Kundenname" />
      <input class="input" id="objectName" type="text" placeholder="Objekt / Adresse" />
      <label class="datewrap"><span class="datelabel">Datum</span><input class="dateinput" id="docDate" type="text" placeholder="Datum" autocomplete="off" /></label>
      <select class="select" id="layoutMode">
        <option value="cover">Titelbild</option>
        <option value="grid" selected>Ohne Titelbild</option>
      </select>
      <button class="btn danger icon-btn" id="clearBtn" type="button" title="Alles zurücksetzen">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/><path d="M13 4v9a2 2 0 01-2 2H5a2 2 0 01-2-2V4"/><line x1="7" y1="7" x2="7" y2="12"/><line x1="9" y1="7" x2="9" y2="12"/></svg>
      </button>
      <input class="hidden-input" id="fileInput" type="file" accept="image/*" multiple />
      <button class="hidden-input" id="pickBtn" type="button"></button>
      <button class="hidden-input" id="pdfBtn" type="button"></button>
    </div>

    <div class="thumbbar" id="thumbbar"></div>
    <div class="pages" id="pages"></div>
  </div>

<script src="app.js"></script>
<script src="pdf-export.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(err) {
    console.log('SW registration failed:', err);
  });
}
</script>
</body>
</html>
