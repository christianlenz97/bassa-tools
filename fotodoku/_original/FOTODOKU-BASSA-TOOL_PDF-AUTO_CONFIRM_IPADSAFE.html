<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BASSA Fotodokumentation All-in-One</title>
<style>
  :root {
    --page-w: 210mm;
    --page-h: 297mm;
    --accent: #f05a28;
    --line: #d7d7d7;
    --bg: #ececec;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: #222;
  }
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 14px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .btn, .input, .select {
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    background: #fff;
  }
  .datewrap{
    display:flex;
    align-items:center;
    gap:8px;
    border:1px solid #ccc;
    border-radius:10px;
    padding: 0 10px;
    background:#fff;
    height:42px;
  }
  .datelabel{
    color:#8a8a8a;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.2px;
  }
  .dateinput{
    border:none;
    padding:0;
    height:38px;
    min-width:135px;
    outline:none;
  }
  .btn {
    cursor: pointer;
  }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }
  .hint {
    font-size: 12px;
    color: #666;
  }
  .hidden-input {
    display: none;
  }

  .btn.loading {
    opacity: 0.7;
    pointer-events: none;
  }
  .wrap {
    padding: 16px;
  }
  .dropzone {
    max-width: 1050px;
    margin: 0 auto 16px auto;
    background: #fff7f3;
    border: 2px dashed var(--accent);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
    color: #8a4524;
    font-weight: 700;
  }
  .thumbbar {
    max-width: 1050px;
    margin: 0 auto 16px auto;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .thumb {
    width: 92px;
    height: 64px;
    border: 1px solid #ccc;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .pages {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .page-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .page-actions {
    width: var(--page-w);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .page-btn {
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    padding: 8px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .page-btn.delete {
    border-color: #cf5f4d;
    color: #a52b1d;
  }
  .page-btn.restore {
    border-color: #666;
    color: #333;
  }
  .page {
    width: var(--page-w);
    min-height: var(--page-h);
    position: relative;
    background: #fff;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  }
  .page-wrap.deleted .page {
    opacity: 0.35;
  }
  .page-wrap.deleted .page::after {
    content: 'WIRD GELÖSCHT';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26pt;
    font-weight: 700;
    color: rgba(176,42,38,0.9);
    pointer-events: none;
  }

<body>
  <div class="toolbar">
    <button class="btn primary" id="pickBtn" type="button">BILDER AUSWÄHLEN</button>
    <input class="hidden-input" id="fileInput" type="file" accept="image/*" multiple />
    <button class="btn" id="pdfBtn" type="button">ALS PDF SPEICHERN</button>
    <button class="btn" id="clearBtn" type="button">ALLES LÖSCHEN</button>
    <input class="input" id="docTitle" type="text" value="FOTODOKUMENTATION" />
    <input class="input" id="customerName" type="text" placeholder="KUNDENNAME" />
    <input class="input" id="objectName" type="text" placeholder="OBJEKT / ADRESSE" />
    <label class="datewrap"><span class="datelabel">DATUM</span><input class="input dateinput" id="docDate" type="date" /></label>
    <select class="select" id="layoutMode">
      <option value="cover">MIT TITELBILD</option>
      <option value="grid" selected>OHNE TITELBILD</option>
    </select>
    <div class="hint">Mit Titelbild = Seite 1 großes Bild. Ohne Titelbild = Seite 1 mit 4 Bildern. Ab Seite 2 immer 4 Bilder pro Seite, nur mit Fußzeile.</div>
  </div>

  <div class="wrap">
    <div class="dropzone" id="dropzone">
      BILDER HIER REINZIEHEN ODER OBEN AUF „BILDER AUSWÄHLEN“ KLICKEN
      <div class="hint" style="margin-top:8px;">Es sind 8 Fotoseiten Reserve vorhanden. Nicht benötigte Seiten kannst du ab Seite 2 löschen.</div>
    </div>
    <div class="thumbbar" id="thumbbar"></div>
    <div class="pages" id="pages"></div>
  </div>

<script>
const fileInput = document.getElementById('fileInput');
const pickBtn = document.getElementById('pickBtn');
const pdfBtn = document.getElementById('pdfBtn');
const clearBtn = document.getElementById('clearBtn');
const docTitle = document.getElementById('docTitle');
const customerName = document.getElementById('customerName');
const objectName = document.getElementById('objectName');
const docDate = document.getElementById('docDate');
const layoutMode = document.getElementById('layoutMode');
const dropzone = document.getElementById('dropzone');
const thumbbar = document.getElementById('thumbbar');
const pages = document.getElementById('pages');

let images = [];
let deletedGridPages = new Set();

pickBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  addFiles(e.target.files);
  fileInput.value = '';
});
pdfBtn.addEventListener('click', async () => {
  await saveAsPdf();
});
clearBtn.addEventListener('click', () => {
  const ok1 = window.confirm('Wirklich ALLE Daten und Bilder löschen?');
  if (!ok1) return;
  const ok2 = window.confirm('Sicher? Dieser Schritt kann nicht rückgängig gemacht werden.');
  if (!ok2) return;

  try {
    if (typeof localStorage !== 'undefined') {
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && /^bassa[_-]fotodoku/i.test(k)) keysToRemove.push(k);
      }
      keysToRemove.forEach(k => localStorage.removeItem(k));
    }
  } catch (e) {
    console.error(e);
  }

  try {
    const url = new URL(window.location.href);
    url.searchParams.set('reset', String(Date.now()));
    window.location.href = url.toString();
  } catch (e) {
    window.location.href = window.location.pathname + '?reset=' + Date.now();
  }
});
docTitle.addEventListener('input', render);
customerName.addEventListener('input', render);
objectName.addEventListener('input', render);
docDate.addEventListener('input', render);
layoutMode.addEventListener('change', () => {
  deletedGridPages = new Set();
  render();
});

['dragenter','dragover'].forEach(evt => {
  document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false);
  dropzone.addEventListener(evt, () => dropzone.style.background = '#ffe7dc', false);
});
['dragleave','drop'].forEach(evt => {
  document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false);
  dropzone.addEventListener(evt, () => dropzone.style.background = '#fff7f3', false);
});
dropzone.addEventListener('drop', (e) => {
  const dt = e.dataTransfer;
  if (dt && dt.files) addFiles(dt.files);
}, false);

function compressImage(file, maxDim, quality) {
  maxDim = maxDim || 1600;
  quality = quality || 0.85;
  return new Promise(function(resolve) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function() {
      var w = img.naturalWidth;
      var h = img.naturalHeight;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      var c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      var dataUrl = c.toDataURL('image/jpeg', quality);
      URL.revokeObjectURL(url);
      resolve({ name: file.name, src: dataUrl });
    };
    img.onerror = function() {
      URL.revokeObjectURL(url);
      var reader = new FileReader();
      reader.onload = function(ev) { resolve({ name: file.name, src: ev.target.result }); };
      reader.readAsDataURL(file);
    };
    img.src = url;
  });
}

function addFiles(fileList) {
  const files = Array.from(fileList || []).filter(f => f.type && f.type.startsWith('image/'));
  if (!files.length) return;
  Promise.all(files.map(function(file) {
    return compressImage(file, 1600, 0.85);
  })).then(function(newImages) {
    images = images.concat(newImages);
    render();
  });
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[m]);
}


function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function showProgress(current, total) {
  pdfBtn.textContent = 'SEITE ' + current + ' / ' + total + ' ...';
}

async function saveAsPdf(){
  const fileName = buildPdfFileName();

  if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
    const oldTitle = document.title;
    document.title = fileName.replace('.pdf','');
    window.print();
    setTimeout(function() { document.title = oldTitle; }, 1200);
    alert('Die PDF-Bibliothek konnte nicht geladen werden. Deshalb wurde auf "Drucken / Als PDF sichern" umgeschaltet.');
    return;
  }

  const originalText = pdfBtn.textContent;
  pdfBtn.classList.add('loading');

  const toolbar = document.querySelector('.toolbar');
  const dropzoneEl = document.getElementById('dropzone');
  const thumbbarEl = document.getElementById('thumbbar');
  const pageNodes = Array.from(document.querySelectorAll('.page-wrap:not(.deleted) .page'));

  if (pageNodes.length === 0) {
    alert('Keine sichtbaren Seiten zum Exportieren vorhanden.');
    pdfBtn.classList.remove('loading');
    return;
  }

  var previous = {
    toolbar: toolbar.style.display,
    dropzone: dropzoneEl.style.display,
    thumbbar: thumbbarEl.style.display,
    bodyBg: document.body.style.background
  };

  toolbar.style.display = 'none';
  dropzoneEl.style.display = 'none';
  thumbbarEl.style.display = 'none';
  document.body.style.background = '#ffffff';

  try {
    var jsPDF = window.jspdf.jsPDF;
    var pdf = new jsPDF('p', 'mm', 'a4');
    var pdfWidth = 210;
    var pdfHeight = 297;
    var total = pageNodes.length;

    for (var i = 0; i < total; i++) {
      showProgress(i + 1, total);
      await new Promise(function(r) { setTimeout(r, 50); });

      var canvas = await html2canvas(pageNodes[i], {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false
      });
      var imgData = canvas.toDataURL('image/jpeg', 0.92);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');

      canvas.width = 0;
      canvas.height = 0;
      canvas = null;
      imgData = null;
    }

    pdfBtn.textContent = 'PDF WIRD GESPEICHERT...';

    if (isIOS()) {
      var blob = pdf.output('blob');
      var blobUrl = URL.createObjectURL(blob);
      var win = window.open(blobUrl, '_blank');
      if (!win) {
        var a = document.createElement('a');
        a.href = blobUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
      setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 60000);
    } else {
      pdf.save(fileName);
    }
  } catch (error) {
    console.error('PDF-Export Fehler:', error);
    alert('PDF-Erstellung fehlgeschlagen: ' + (error.message || 'Unbekannter Fehler') + '\n\nTipp: Bei vielen Bildern kann der Speicher knapp werden. Versuche es mit weniger Seiten.');
  } finally {
    toolbar.style.display = previous.toolbar;
    dropzoneEl.style.display = previous.dropzone;
    thumbbarEl.style.display = previous.thumbbar;
    document.body.style.background = previous.bodyBg;
    pdfBtn.textContent = originalText;
    pdfBtn.classList.remove('loading');
  }
}


function buildPdfFileName() {
  const rawDate = (docDate.value || '').trim();
  const rawObject = (objectName.value || '').trim();
  const rawCustomer = (customerName.value || '').trim();

  const datePart = sanitizeFileName(rawDate || new Date().toISOString().slice(0,10));
  const objectPart = sanitizeFileName(rawObject || 'Objekt');
  const customerPart = sanitizeFileName(rawCustomer || 'Kunde');

  return `${datePart}_${objectPart}_${customerPart}_FOTODOKU.pdf`;
}

function sanitizeFileName(value) {
  return String(value || '')
    .trim()
    .replace(/[\\/:*?"<>|]+/g, '')
    .replace(/\s+/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_+|_+$/g, '') || 'FOTODOKU';
}

function formatDate(value) {
  if (!value) return '';
  const parts = value.split('-');
  if (parts.length !== 3) return value;
  return parts[2] + '.' + parts[1] + '.' + parts[0];
}

function combinedLine() {
  const c = (customerName.value || '').trim();
  const o = (objectName.value || '').trim();
  if (c && o) return escapeHtml(c + ' - ' + o);
  return escapeHtml(c || o);
}

function renderThumbs() {
  thumbbar.innerHTML = '';
  images.forEach((img, idx) => {
    const d = document.createElement('div');
    d.className = 'thumb';
    d.title = (idx + 1) + ': ' + img.name;
    d.innerHTML = '<img src="' + img.src + '" alt="">';
    thumbbar.appendChild(d);
  });
}

function pageNumber(n) {
  return '<div class="page-number">Seite ' + n + '</div>';
}

function createPageWrap(pageElement, pageNo, isGridPage) {
  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  if (isGridPage && deletedGridPages.has(pageNo)) wrap.classList.add('deleted');

  const actions = document.createElement('div');
  actions.className = 'page-actions';

  if (isGridPage) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'page-btn ' + (deletedGridPages.has(pageNo) ? 'restore' : 'delete');
    btn.textContent = deletedGridPages.has(pageNo) ? 'SEITE WIEDERHERSTELLEN' : 'SEITE LÖSCHEN';
    btn.addEventListener('click', () => {
      if (deletedGridPages.has(pageNo)) deletedGridPages.delete(pageNo);
      else deletedGridPages.add(pageNo);
      render();
    });
    actions.appendChild(btn);
  }

  wrap.appendChild(actions);
  wrap.appendChild(pageElement);
  return wrap;
}

function renderSlot(item, label) {
  return '<div class="slot">' +
    (item
      ? '<span class="img-number">' + label + '</span><img src="' + item.src + '" alt="">'
      : '<div class="placeholder">FREI</div>') +
    '</div>';
}

function renderFirstPage() {
  const mode = layoutMode.value || 'grid';
  const page = document.createElement('div');
  page.className = 'page';

  if (mode === 'cover') {
    page.innerHTML = `
      <div class="header-img"></div>
      <div class="title">${escapeHtml(docTitle.value || 'FOTODOKUMENTATION')}
        <div class="customer">${combinedLine()}</div>
      </div>
      <div class="cover-slot">${images[0] ? '<img src="' + images[0].src + '" alt="">' : '<div class="placeholder">TITELBILD</div>'}</div>
      <div class="docdate">${docDate.value ? formatDate(docDate.value) : ''}</div>
      <div class="footer-img"></div>
      ${pageNumber(1)}
    `;
  } else {
    page.innerHTML = `
      <div class="header-img"></div>
      <div class="title">${escapeHtml(docTitle.value || 'FOTODOKUMENTATION')}
        <div class="customer">${combinedLine()}</div>
        
      </div>
      <div class="grid-cover">
        ${
          [0,1,2,3].map(i => renderSlot(images[i], 'Bild ' + (i + 1))).join('')
        }
      </div>
      <div class="docdate">${docDate.value ? formatDate(docDate.value) : ''}</div>
      <div class="footer-img"></div>
      ${pageNumber(1)}
    `;
  }

  return createPageWrap(page, 1, false);
}

function renderGridPage(chunk, pageNo, firstImageNumber) {
  const page = document.createElement('div');
  page.className = 'page';
  page.innerHTML = `
    <div class="grid-standard">
      ${
        [0,1,2,3].map(i => renderSlot(chunk[i], 'Bild ' + (firstImageNumber + i))).join('')
      }
    </div>
    <div class="footer-img"></div>
    ${pageNumber(pageNo)}
  `;
  return createPageWrap(page, pageNo, true);
}

function render() {
  renderThumbs();
  pages.innerHTML = '';

  pages.appendChild(renderFirstPage());

  const coverMode = layoutMode.value === 'cover';
  const rest = coverMode ? images.slice(1) : images.slice(4);
  const minGridPages = 8;
  const neededPages = Math.max(minGridPages, Math.ceil(rest.length / 4) || 0);
  const firstImageNumber = coverMode ? 2 : 5;

  for (let p = 0; p < neededPages; p++) {
    const start = p * 4;
    const chunk = rest.slice(start, start + 4);
    const pageNo = p + 2;
    const startLabel = firstImageNumber + start;
    pages.appendChild(renderGridPage(chunk, pageNo, startLabel));
  }
}

render();
</script>
</body>
</html>
